name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `opentidy start`
        2. Create a new job with instruction "..."
        3. Observe error in logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version and system info.
      placeholder: |
        - OS: macOS 15.3 / Ubuntu 24.04 / ...
        - Node.js: v22.x
        - Claude Code: v1.x
        - OpenTidy: v0.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant log output (from `opentidy logs`). Redact any sensitive information.
      render: shell
