name: Release
on:
  push:
    tags: ['v*', 'opentidy-v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test

  release:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build

      - name: Package with pnpm deploy
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION_TAG#opentidy-v}"
          VERSION="${VERSION#v}"

          # pnpm deploy: flat node_modules with prod deps for backend
          pnpm --filter @opentidy/backend deploy ./release --prod --legacy

          # Web frontend (Vite builds to apps/backend/web-dist/)
          cp -r apps/backend/web-dist/ ./release/web-dist/

          # Module manifests + scripts
          cp -r apps/backend/modules/ ./release/modules/

          # Hooks plugin
          mkdir -p ./release/plugins
          cp -r plugins/opentidy-hooks/ ./release/plugins/opentidy-hooks/

          # Claude Code config template
          cp -r apps/backend/config/ ./release/config/

          # CLI wrapper
          mkdir -p ./release/bin
          cp bin/opentidy ./release/bin/opentidy
          chmod +x ./release/bin/opentidy

          # Version file (read by cli.ts getVersion())
          echo "$VERSION" > ./release/VERSION

          # Create tarball
          mv ./release "opentidy-$VERSION"
          tar -czf "opentidy-$VERSION.tar.gz" "opentidy-$VERSION/"

      - name: Upload tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ github.ref_name }}
        run: gh release upload "$VERSION_TAG" opentidy-*.tar.gz --clobber

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION_TAG#opentidy-v}"
          VERSION="${VERSION#v}"
          TARBALL_URL="https://github.com/opentidy/opentidy/releases/download/${VERSION_TAG}/opentidy-${VERSION}.tar.gz"

          # Download tarball and compute SHA256
          curl -fsSL "$TARBALL_URL" -o tarball.tar.gz
          SHA256=$(sha256sum tarball.tar.gz | cut -d' ' -f1)
          echo "Version: $VERSION, SHA256: $SHA256"

          # Clone tap repo and update formula
          git clone "https://x-access-token:${GH_TOKEN}@github.com/opentidy/homebrew-opentidy.git" tap
          cd tap
          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/opentidy.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/opentidy.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opentidy.rb
          git commit -m "opentidy ${VERSION}"
          git push
