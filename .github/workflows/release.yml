name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test

  release:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build

      - name: Package with pnpm deploy
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION_TAG#v}"

          # pnpm deploy creates a flat node_modules with all prod deps
          # for the @opentidy/backend package. It also copies dist/ and package.json.
          pnpm --filter @opentidy/backend deploy ./release --prod --legacy

          # The shared package is a workspace dependency — pnpm deploy resolves it
          # into node_modules, but we also include the source for reference.
          mkdir -p ./release/shared
          cp -r packages/shared/dist/ ./release/shared/dist/
          cp packages/shared/package.json ./release/shared/package.json

          # Add web frontend build
          mkdir -p ./release/web-dist
          cp -r apps/web/dist/ ./release/web-dist/

          # Add hooks plugin
          mkdir -p ./release/plugins/opentidy-hooks
          cp -r plugins/opentidy-hooks/ ./release/plugins/opentidy-hooks/

          # Add Claude Code config template
          mkdir -p ./release/config/claude
          cp -r apps/backend/config/claude/ ./release/config/claude/

          # Add CLI wrapper
          mkdir -p ./release/bin
          cp bin/opentidy ./release/bin/opentidy
          chmod +x ./release/bin/opentidy

          # Add LaunchAgent template
          cp com.opentidy.agent.plist ./release/com.opentidy.agent.plist

          # Add updater script
          cp opentidy-updater.sh ./release/opentidy-updater.sh
          chmod +x ./release/opentidy-updater.sh

          # Version file (read by cli.ts getVersion())
          echo "$VERSION" > ./release/VERSION

          # Create tarball
          mv ./release "opentidy-$VERSION"
          tar -czf "opentidy-$VERSION.tar.gz" "opentidy-$VERSION/"

      - uses: softprops/action-gh-release@v2
        with:
          files: opentidy-*.tar.gz
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: dawidd6/action-homebrew-bump-formula@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: opentidy/opentidy
          formula: opentidy
          tag: ${{ github.ref_name }}
